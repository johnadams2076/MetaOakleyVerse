name: DAT CameraAccess Sample

"on":
  workflow_dispatch:
    inputs:
      run_ui_tests:
        description: "Run CameraAccess UI tests and record simulator video"
        required: false
        default: true
        type: boolean

jobs:
  cameraaccess-sample:
    runs-on: macos-15
    env:
      SAMPLE_REPO: https://github.com/facebook/meta-wearables-dat-ios.git
      SAMPLE_DIR: external/meta-wearables-dat-ios/samples/CameraAccess
      PROJECT_PATH: CameraAccess.xcodeproj
      SCHEME: CameraAccess
      RESULT_BUNDLE: TestResults/CameraAccess.xcresult
      UI_RESULT_BUNDLE: TestResults/CameraAccessUITests.xcresult
      DAT_DEVELOPER_MODE: "true"
      META_APP_ID: ${{ secrets.META_APP_ID }}
      CLIENT_TOKEN: ${{ secrets.CLIENT_TOKEN }}
      DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Clone Meta DAT sample repository
        run: |
          mkdir -p external
          rm -rf external/meta-wearables-dat-ios
          git clone --depth 1 "$SAMPLE_REPO" external/meta-wearables-dat-ios

      - name: Patch sample for Xcode 16.4 compatibility
        run: |
          # Upstream sample uses `isolated deinit`, which is unavailable in
          # the production compiler shipped on GitHub's Xcode 16.4 image.
          # Use a no-op deinit to avoid runtime traps from actor assumptions.
          perl -0777 -i -pe 's#isolated deinit \{\n\s*deviceMonitorTask\?\.cancel\(\)\n\s*stateObserverTask\?\.cancel\(\)\n\s*deviceSession\?\.stop\(\)\n\s*\}#deinit {}#s' "$SAMPLE_DIR/CameraAccess/ViewModels/DeviceSessionManager.swift"
          perl -0777 -i -pe 's#isolated deinit \{\n\s*registrationTask\?\.cancel\(\)\n\s*deviceStreamTask\?\.cancel\(\)\n\s*setupDeviceStreamTask\?\.cancel\(\)\n\s*\}#deinit {}#s' "$SAMPLE_DIR/CameraAccess/ViewModels/WearablesViewModel.swift"

          # Make app init fail-fast on configure() errors so CI exposes the
          # real issue instead of crashing later at Wearables.shared.
          perl -0777 -i -pe 's@init\(\) \{.*?\n  \}\n\n  var body@init() {\n    do {\n      try Wearables.configure()\n    } catch {\n      fatalError("[CameraAccess] Failed to configure Wearables SDK: " + String(describing: error))\n    }\n\n    #if DEBUG\n    if ProcessInfo.processInfo.arguments.contains("--ui-testing") {\n      MockDeviceKit.shared.enable(config: MockDeviceKitConfig(initiallyRegistered: false))\n\n      let portFilePath = ProcessInfo.processInfo.environment["MWDAT_TEST_SERVER_PORT_FILE"]\n      Task {\n        try await MockDeviceKit.shared.startTestServer(portFilePath: portFilePath)\n      }\n    }\n    #endif\n\n    let wearables = Wearables.shared\n    self.wearables = wearables\n    self._wearablesViewModel = State(wrappedValue: WearablesViewModel(wearables: wearables))\n  }\n\n  var body@s' "$SAMPLE_DIR/CameraAccess/CameraAccessApp.swift"

          # Ensure unit tests don't hide configure() failures with `try?`.
          perl -0777 -i -pe 's@override func setUp\(\) async throws \{.*?try await Task\.sleep\(nanoseconds: 1_000_000_000\)\n  \}@override func setUp() async throws {\n    try await super.setUp()\n    try Wearables.configure()\n\n    MockDeviceKit.shared.enable()\n\n    // Pair mock device and set up camera kit\n    let pairedMockDevice = MockDeviceKit.shared.pairRaybanMeta()\n    mockDevice = pairedMockDevice\n    cameraKit = pairedMockDevice.services.camera\n\n    // Power on and unfold the device to make it available\n    pairedMockDevice.powerOn()\n    pairedMockDevice.unfold()\n\n    // Wait for device to be available in Wearables\n    try await Task.sleep(nanoseconds: 1_000_000_000)\n  }@s' "$SAMPLE_DIR/CameraAccessTests/CameraAccessTests.swift"

          echo "Patched CameraAccessApp init:"
          sed -n '1,90p' "$SAMPLE_DIR/CameraAccess/CameraAccessApp.swift"
          echo "Patched CameraAccessTests setUp():"
          sed -n '1,90p' "$SAMPLE_DIR/CameraAccessTests/CameraAccessTests.swift"

      - name: Resolve simulator destination
        run: |
          DEST=$(xcrun simctl list devices available | grep -E "iPhone 16 \(" | head -n 1 | sed -E 's/^.*\(([^)]+)\) \(.*$/platform=iOS Simulator,id=\1/')
          if [ -z "$DEST" ]; then
            DEST='platform=iOS Simulator,name=iPhone 16'
          fi
          echo "IOS_DESTINATION=$DEST" >> "$GITHUB_ENV"
          if echo "$DEST" | grep -q 'id='; then
            SIM_ID="${DEST#*id=}"
            echo "IOS_SIM_ID=$SIM_ID" >> "$GITHUB_ENV"
          fi

      - name: Reset simulator state
        run: |
          xcrun simctl shutdown all || true
          if [ -n "${IOS_SIM_ID:-}" ]; then
            xcrun simctl erase "$IOS_SIM_ID" || true
          fi

      - name: Boot simulator
        run: |
          if [ -n "${IOS_SIM_ID:-}" ]; then
            xcrun simctl boot "$IOS_SIM_ID" || true
            xcrun simctl bootstatus "$IOS_SIM_ID" -b
          else
            xcrun simctl boot "iPhone 16" || true
            xcrun simctl bootstatus "iPhone 16" -b
          fi

      - name: List CameraAccess schemes
        working-directory: ${{ env.SAMPLE_DIR }}
        run: |
          xcodebuild -list -project "$PROJECT_PATH"

      - name: Build CameraAccess for simulator
        working-directory: ${{ env.SAMPLE_DIR }}
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "$IOS_DESTINATION" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build | tee build.log

      - name: Run CameraAccess unit tests
        working-directory: ${{ env.SAMPLE_DIR }}
        run: |
          mkdir -p TestResults
          set -o pipefail
          if [ "${DAT_DEVELOPER_MODE:-false}" = "true" ]; then
            EFFECTIVE_META_APP_ID="${META_APP_ID:-0}"
            EFFECTIVE_CLIENT_TOKEN="${CLIENT_TOKEN:-developer-mode}"
            EFFECTIVE_DEVELOPMENT_TEAM="${DEVELOPMENT_TEAM:-AAAAAAAAAA}"
            echo "DAT Developer Mode enabled: forcing dev-safe DAT settings for CI." | tee -a test.log
          else
            EFFECTIVE_META_APP_ID="${META_APP_ID:-}"
            EFFECTIVE_CLIENT_TOKEN="${CLIENT_TOKEN:-}"
            EFFECTIVE_DEVELOPMENT_TEAM="${DEVELOPMENT_TEAM:-}"
          fi

          if [ -z "${EFFECTIVE_META_APP_ID:-}" ] || [ -z "${EFFECTIVE_CLIENT_TOKEN:-}" ] || [ -z "${EFFECTIVE_DEVELOPMENT_TEAM:-}" ]; then
            echo "Warning: one or more DAT settings are empty (META_APP_ID, CLIENT_TOKEN, DEVELOPMENT_TEAM)." | tee -a test.log
          fi

          run_tests() {
            local result_bundle="$1"
            xcodebuild \
              -project "$PROJECT_PATH" \
              -scheme "$SCHEME" \
              -destination "$IOS_DESTINATION" \
              -configuration Debug \
              -resultBundlePath "$result_bundle" \
              -parallel-testing-enabled NO \
              -maximum-concurrent-test-simulator-destinations 1 \
              CODE_SIGNING_ALLOWED=NO \
              META_APP_ID="${EFFECTIVE_META_APP_ID:-}" \
              CLIENT_TOKEN="${EFFECTIVE_CLIENT_TOKEN:-}" \
              DEVELOPMENT_TEAM="${EFFECTIVE_DEVELOPMENT_TEAM:-}" \
              test \
              -only-testing:CameraAccessTests \
              -skip-testing:CameraAccessUITests
          }

          set +e
          run_tests "$RESULT_BUNDLE" 2>&1 | tee test.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -ne 0 ]; then
            echo "First unit test attempt failed (exit $status). Rebooting simulator and retrying once..." | tee -a test.log
            if [ -n "${IOS_SIM_ID:-}" ]; then
              xcrun simctl shutdown "$IOS_SIM_ID" || true
              xcrun simctl boot "$IOS_SIM_ID" || true
              xcrun simctl bootstatus "$IOS_SIM_ID" -b || true
            else
              xcrun simctl shutdown all || true
              xcrun simctl boot "iPhone 16" || true
              xcrun simctl bootstatus "iPhone 16" -b || true
            fi

            RETRY_RESULT_BUNDLE="TestResults/CameraAccess-retry.xcresult"
            set +e
            run_tests "$RETRY_RESULT_BUNDLE" 2>&1 | tee -a test.log
            status=${PIPESTATUS[0]}
            set -e
          fi

          exit "$status"

      - name: Start simulator screen recording (UI tests)
        if: ${{ github.event.inputs.run_ui_tests != 'false' }}
        working-directory: ${{ env.SAMPLE_DIR }}
        run: |
          mkdir -p Artifacts
          if [ -n "${IOS_SIM_ID:-}" ]; then
            xcrun simctl io "$IOS_SIM_ID" recordVideo Artifacts/cameraaccess-ui-demo.mov &
          else
            xcrun simctl io booted recordVideo Artifacts/cameraaccess-ui-demo.mov &
          fi
          echo $! > Artifacts/recording_pid.txt

      - name: Run CameraAccess UI tests
        if: ${{ github.event.inputs.run_ui_tests != 'false' }}
        working-directory: ${{ env.SAMPLE_DIR }}
        run: |
          mkdir -p TestResults
          set -o pipefail
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "$IOS_DESTINATION" \
            -configuration Debug \
            -resultBundlePath "$UI_RESULT_BUNDLE" \
            CODE_SIGNING_ALLOWED=NO \
            test \
            -only-testing:CameraAccessUITests | tee ui-test.log

      - name: Capture final simulator screenshot (UI tests)
        if: ${{ always() && github.event.inputs.run_ui_tests != 'false' }}
        working-directory: ${{ env.SAMPLE_DIR }}
        run: |
          mkdir -p Artifacts
          if [ -n "${IOS_SIM_ID:-}" ]; then
            xcrun simctl io "$IOS_SIM_ID" screenshot Artifacts/final-screen-ui.png || true
          else
            xcrun simctl io booted screenshot Artifacts/final-screen-ui.png || true
          fi

      - name: Stop simulator screen recording (UI tests)
        if: ${{ always() && github.event.inputs.run_ui_tests != 'false' }}
        working-directory: ${{ env.SAMPLE_DIR }}
        run: |
          if [ -f Artifacts/recording_pid.txt ]; then
            kill -INT "$(cat Artifacts/recording_pid.txt)" || true
            sleep 5
          fi

      - name: Upload CameraAccess artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dat-cameraaccess-results
          path: |
            external/meta-wearables-dat-ios/samples/CameraAccess/build.log
            external/meta-wearables-dat-ios/samples/CameraAccess/test.log
            external/meta-wearables-dat-ios/samples/CameraAccess/ui-test.log
            external/meta-wearables-dat-ios/samples/CameraAccess/Artifacts/**
            external/meta-wearables-dat-ios/samples/CameraAccess/TestResults/**