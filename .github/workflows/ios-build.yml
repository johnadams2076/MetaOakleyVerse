name: iOS Build
on:
  push:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p
      - name: Install XcodeGen
        run: |
          brew install xcodegen
      - name: Generate Xcode project
        run: |
          xcodegen generate
      - name: Resolve simulator destination
        run: |
          DEST=$(xcrun simctl list devices available | grep -E "iPhone 16 \(" | head -n 1 | sed -E 's/^.*\(([^)]+)\) \(.*$/platform=iOS Simulator,id=\1/')
          if [ -z "$DEST" ]; then
            DEST='platform=iOS Simulator,name=iPhone 16'
          fi
          echo "IOS_DESTINATION=$DEST" >> "$GITHUB_ENV"
      - name: List schemes
        run: |
          xcodebuild -list -project MetaOakleyVision.xcodeproj
      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -project MetaOakleyVision.xcodeproj \
            -scheme MetaOakleyVision \
            -resolvePackageDependencies
      - name: Build for simulator
        run: |
          xcodebuild \
            -project MetaOakleyVision.xcodeproj \
            -scheme MetaOakleyVision \
            -destination "$IOS_DESTINATION" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Run unit tests
        run: |
          xcodebuild \
            -project MetaOakleyVision.xcodeproj \
            -scheme MetaOakleyVision \
            -destination "$IOS_DESTINATION" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test \
            -only-testing:MetaOakleyVisionTests
