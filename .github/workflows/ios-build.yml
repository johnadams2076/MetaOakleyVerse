name: iOS Build
on:
  push:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p
      - name: Install XcodeGen
        run: |
          brew install xcodegen
      - name: Generate Xcode project
        run: |
          xcodegen generate
      - name: List schemes
        run: |
          xcodebuild -list -project MetaOakleyVision.xcodeproj
      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -project MetaOakleyVision.xcodeproj \
            -scheme MetaOakleyVision \
            -resolvePackageDependencies
      - name: Build for simulator
        run: |
          xcodebuild \
            -project MetaOakleyVision.xcodeproj \
            -scheme MetaOakleyVision \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Run unit tests
        run: |
          xcodebuild \
            -project MetaOakleyVision.xcodeproj \
            -scheme MetaOakleyVision \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test \
            -only-testing:MetaOakleyVisionTests
